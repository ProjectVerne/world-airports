name: Validate

on:
  pull_request:
    paths:
      - "data/airports/**"
      - "scripts/**"
      - "schema/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches:
      - main
    paths:
      - "data/airports/**"
      - "scripts/**"
      - "schema/**"
      - "package.json"
      - "package-lock.json"

jobs:
  validate:
    name: Validate v2 records
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Validate (schema + key==filename + shard path)
        run: node scripts/validate.js data/airports
      - name: Build collision index (smoke test)
        run: node scripts/export/to-codes.js data/airports --out dist/codes.json
