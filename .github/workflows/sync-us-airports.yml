name: Sync US Airports (FAA)

# Runs every Monday at 06:00 UTC to check for updated FAA airport data.
# Creates a pull request if any US airport records have changed.
# Can also be triggered manually from the Actions tab.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  sync:
    name: Sync US airport data from FAA
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Download the latest OurAirports CSVs, which are sourced from FAA NASR
      # for US airports and published under CC0.
      - name: Download FAA/OurAirports data
        run: |
          curl -fsSL -o airports.csv https://ourairports.com/data/airports.csv
          curl -fsSL -o runways.csv https://ourairports.com/data/runways.csv
          curl -fsSL -o frequencies.csv https://ourairports.com/data/airport-frequencies.csv

      - name: Run US airport sync
        run: |
          node scripts/import/from-faa-us.js \
            --airports airports.csv \
            --runways runways.csv \
            --frequencies frequencies.csv \
            2>&1 | tee sync.log

      - name: Validate updated data
        run: node scripts/validate.js

      - name: Check for changes
        id: changes
        run: |
          git add data/airports/
          if git diff --cached --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No airport data changes detected."
          else
            COUNT=$(git diff --cached --name-only data/airports/ | wc -l | tr -d ' ')
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
            echo "$COUNT airport file(s) changed."
            git diff --cached --name-only data/airports/ | head -20
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="sync/faa-us-airports-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git commit -m "sync: update US airports from FAA/OurAirports ($(date +%Y-%m-%d))"
          git push origin "$BRANCH"

          TAIL=$(tail -15 sync.log)
          gh pr create \
            --title "sync: US airport data update ($(date +%Y-%m-%d))" \
            --body "## Automated US Airport Sync

          Weekly sync of US airport data sourced from FAA via OurAirports (CC0 licensed).

          **Changed files:** ${{ steps.changes.outputs.count }}

          <details><summary>Sync log (last 15 lines)</summary>

          \`\`\`
          ${TAIL}
          \`\`\`

          </details>

          ---
          *Triggered by: ${{ github.event_name }}*" \
            --base main \
            --head "$BRANCH"
